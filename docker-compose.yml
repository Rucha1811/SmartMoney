version: '3.8'

services:
  # PHP Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your-api-key-here}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-your-api-key-here}
      - APP_ENV=${APP_ENV:-development}
    volumes:
      - .:/var/www/html
      - ./cache:/var/www/html/cache
    depends_on:
      - db
    networks:
      - smartmoney-network
    restart: unless-stopped

  # MySQL Database Service (Optional - if needed)
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-smartmoney_db}
      MYSQL_USER: ${DB_USER:-smartmoney}
      MYSQL_PASSWORD: ${DB_PASSWORD:-smartmoney123}
    ports:
      - "3306:3306"
    volumes:
      - ./money.sql:/docker-entrypoint-initdb.d/01-init.sql
      - mysql-data:/var/lib/mysql
    networks:
      - smartmoney-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  smartmoney-network:
    driver: bridge
